services:
  localstack:
    image: localstack/localstack:3.0
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs,sns,kms,iam,sts
      DEBUG: 1

  redis:
    image: redis:7-alpine
    ports:
      # Overridable, since 6379 is often already taken by another local project.
      - "${REDIS_PORT:-6379}:6379"
